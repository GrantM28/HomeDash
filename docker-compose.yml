services:
  backend:
    build:
      context: ./backend
    container_name: homelab-dashboard-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3040:3040"

  frontend:
    build:
      context: ./frontend
      args:
        # For the Vite build step inside Docker. Frontend will call backend through this.
        VITE_API_BASE: "http://192.168.1.4:3040"
    container_name: homelab-dashboard-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3080:80"